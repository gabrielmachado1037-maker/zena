services:
  - type: web
    name: clinne-mcp
    runtime: node
    rootDir: mcp-server
    buildCommand: npm install && npm run build
    startCommand: node dist/index.js
    plan: free
    envVars:
      - key: CLINNE_EMAIL
        sync: false
      - key: CLINNE_PASSWORD
        sync: false
      - key: MCP_API_KEY
        generateValue: true
      - key: NODE_VERSION
        value: "20"
