services:
  - type: web
    name: nexvel-mcp
    runtime: node
    rootDir: mcp-server
    buildCommand: npm install && npm run build
    startCommand: node dist/index.js
    plan: free
    envVars:
      - key: NEXVEL_API_URL
        value: https://zena-l2jd.onrender.com
      - key: NEXVEL_EMAIL
        sync: false
      - key: NEXVEL_PASSWORD
        sync: false
      - key: MCP_API_KEY
        generateValue: true
      - key: MCP_OAUTH_SENHA
        sync: false
      - key: NODE_VERSION
        value: "20"
