name: Verificar restauração do backup

# Um arquivo .sql.gz no bucket não é backup — é um arquivo com boa aparência.
# Só vira backup depois de restaurar e conferir que os dados voltaram. Este
# workflow faz isso sozinho, toda semana, num Postgres descartável dentro do
# runner: nada toca o banco de produção e nenhuma credencial nova é necessária.
#
# Baixa o backup MAIS RECENTE do Supabase, restaura, e valida. Se não restaurar,
# abre issue — a falha silenciosa é o que já custou 7 dias sem backup aqui.

on:
  schedule:
    - cron: "0 8 * * 1"    # segundas, 08:00 UTC (~05:00 BRT), depois do backup diário
  workflow_dispatch: {}

concurrency:
  group: verificar-restauracao
  cancel-in-progress: false

jobs:
  restaurar:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      issues: write
    env:
      BUCKET: db-backups
      # Banco descartável, vive só enquanto este job roda.
      PGURL: postgresql://postgres:postgres@localhost:5432/restauracao_teste

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: restauracao_teste
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Instalar cliente PostgreSQL 18
        run: |
          set -euo pipefail
          sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/pgdg.gpg
          sudo apt-get update
          sudo apt-get install -y postgresql-client-18

      - name: Baixar o backup mais recente
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          set -euo pipefail
          exec > >(tee -a /tmp/erro-restauracao.log) 2>&1

          lista=$(curl -s -X POST "$SUPABASE_URL/storage/v1/object/list/$BUCKET" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_KEY" \
            -H "Content-Type: application/json" \
            -d '{"prefix":"","limit":100,"sortBy":{"column":"created_at","order":"desc"}}')

          NOME=$(echo "$lista" | jq -r '[.[]? | select(.name | endswith(".sql.gz"))] | .[0].name // empty')
          if [ -z "$NOME" ]; then
            echo "::error::Nenhum backup .sql.gz encontrado no bucket $BUCKET. O backup diário está rodando?"
            exit 1
          fi
          echo "Backup mais recente: $NOME"

          code=$(curl -s -o backup.sql.gz -w "%{http_code}" \
            "$SUPABASE_URL/storage/v1/object/$BUCKET/$NOME" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_KEY")
          if [ "$code" != "200" ]; then echo "::error::Download falhou ($code)"; exit 1; fi

          # Idade importa: um backup que parou de ser atualizado é tão inútil
          # quanto um que não existe, e a rotação sozinha não denuncia isso.
          DATA=$(echo "$NOME" | sed -E 's/nexvel-([0-9]{4}-[0-9]{2}-[0-9]{2}).*/\1/')
          IDADE=$(( ( $(date -u +%s) - $(date -u -d "$DATA" +%s) ) / 86400 ))
          echo "Idade do backup: ${IDADE} dia(s)"
          if [ "$IDADE" -gt 3 ]; then
            echo "::error::Backup mais recente tem ${IDADE} dias. O agendamento diário parou de funcionar."
            exit 1
          fi
          echo "ARQUIVO=$NOME" >> "$GITHUB_ENV"

      - name: Restaurar no Postgres descartável
        run: |
          set -euo pipefail
          exec > >(tee -a /tmp/erro-restauracao.log) 2>&1

          gzip -dc backup.sql.gz > dump.sql
          echo "SQL descomprimido: $(du -h dump.sql | cut -f1)"

          # ON_ERROR_STOP=1: restauração que "quase deu certo" é a pior das
          # respostas — melhor falhar aqui do que descobrir num desastre real.
          if ! psql "$PGURL" -v ON_ERROR_STOP=1 -q -f dump.sql > /tmp/psql.log 2>&1; then
            echo "::error::psql falhou ao restaurar o dump."
            tail -30 /tmp/psql.log
            exit 1
          fi
          echo "Restauração concluída sem erro."

      - name: Conferir o que voltou
        run: |
          set -euo pipefail
          exec > >(tee -a /tmp/erro-restauracao.log) 2>&1

          consulta() { psql "$PGURL" -tAc "$1"; }

          TABELAS=$(consulta "select count(*) from information_schema.tables where table_schema='public'")
          echo "Tabelas restauradas: $TABELAS"
          if [ "$TABELAS" -lt 20 ]; then
            echo "::error::Só $TABELAS tabelas — o schema tem bem mais que isso. Restauração incompleta."
            exit 1
          fi

          # Tabelas vazias passariam despercebidas numa checagem só de schema:
          # o backup precisa conter DADOS, não apenas a estrutura.
          FALHOU=0
          for t in Nutricionista Paciente; do
            N=$(consulta "select count(*) from \"$t\"" 2>/dev/null || echo "ERRO")
            echo "  $t: $N registro(s)"
            if [ "$N" = "ERRO" ]; then echo "::error::Tabela $t não existe no backup restaurado."; FALHOU=1
            elif [ "$N" -eq 0 ]; then echo "::error::Tabela $t voltou VAZIA — o backup tem schema mas não tem dados."; FALHOU=1
            fi
          done
          [ "$FALHOU" -eq 0 ] || exit 1

          echo ""
          echo "✅ Backup ${ARQUIVO} restaurou e contém dados. Este é um backup utilizável."

      - name: Abrir issue se a restauração falhar
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            let detalhe = "";
            try {
              const fs = require("fs");
              if (fs.existsSync("/tmp/erro-restauracao.log")) {
                let txt = fs.readFileSync("/tmp/erro-restauracao.log", "utf8").trim();
                // Repositório PÚBLICO: redige credenciais antes de publicar.
                txt = txt
                  .replace(/(\w+:\/\/)[^:@\s/]+:[^@\s/]+@/g, "$1***:***@")
                  .replace(/(password|pgpassword)=[^\s&"']+/gi, "$1=***")
                  .replace(/eyJ[A-Za-z0-9_-]{20,}/g, "***jwt***");
                if (txt) detalhe = ["", "```", txt.slice(-1500), "```"].join("\n");
              }
            } catch {}

            const corpo = [
              `A verificação semanal de restauração falhou em ${new Date().toISOString().slice(0, 16)}.`,
              ``,
              `**O backup existe mas NÃO restaura — o que equivale a não ter backup.**`,
              detalhe,
              ``,
              `Log: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            ].join("\n");

            const { data: abertas } = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: "open", labels: "restauracao-falhou",
            });
            if (abertas.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: abertas[0].number, body: corpo,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title: "🚨 Backup não restaura", body: corpo, labels: ["restauracao-falhou"],
              });
            }
