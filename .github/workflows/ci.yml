name: CI

# Roda em todo push e PR. O objetivo não é cobrir tudo: é impedir que uma
# proteção de segurança seja removida em silêncio, que é como os incidentes
# deste projeto aconteceram (código correto, guarda apagada, ninguém notou).
on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci
        working-directory: backend

      # Gera o client do Prisma — o tsc não passa sem ele.
      - run: npx prisma generate
        working-directory: backend

      - name: Typecheck
        run: npx tsc --noEmit
        working-directory: backend

      - name: Checagem de segurança
        run: npm run seguranca
        working-directory: backend

      # Falha só em vulnerabilidade alta/crítica: moderadas em devDependency
      # parariam o CI sem risco real em produção.
      - name: npm audit
        run: npm audit --omit=dev --audit-level=high
        working-directory: backend

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
        working-directory: frontend

      - name: Typecheck
        run: npx tsc --noEmit
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend
